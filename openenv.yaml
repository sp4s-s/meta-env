name: dep-vuln-env
version: "3.0.0"
description: "Code-centric RL benchmark for dependency vulnerability analysis. Agent receives source code, identifies vulnerable imports, and proposes remediations."
entry_point: "env.environment:DepVulnEnv"
observation_space: "env.models:Observation"
action_space: "env.models:Action"
reward_space: "env.models:Reward"
reward_range: [-1.0, 1.0]
tags:
  - openenv
  - cybersecurity
  - code-analysis
  - supply-chain
tasks:
  - id: 1
    name: code_vuln_identify
    difficulty: easy
    max_steps: 5
    description: "Identify CVEs by analyzing import patterns and API usage in source code."
    grader: "graders.task_1:grade_task_1"
  - id: 2
    name: code_vuln_remediate
    difficulty: medium
    max_steps: 10
    description: "Identify and remediate vulnerabilities with correct fix versions under budget."
    grader: "graders.task_2:grade_task_2"
  - id: 3
    name: constrained_remediation
    difficulty: hard
    max_steps: 20
    description: "Multi-file project remediation under budget and SLA constraints. Critical CVEs must be resolved."
    grader: "graders.task_3:grade_task_3"
